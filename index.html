<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta http-equiv="Cache-Control" content="no-cache" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title> More Zhou </title>
    <link href="./static/img/favicon.ico" rel="shortcut icon" type="image/x-icon">
    <script type="text/javascript" src="assets/dat.gui.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,300;0,400;0,500;1,300;1,400&family=Noto+Sans+SC:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            user-select: none;
        }

        html,
        body {
            overflow: hidden;
            background-color: #f2efe9;
            font-family: 'Raleway', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            margin: 0;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .paper-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .paper-overlay svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .wrap {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            top: 0;
            color: #3a3632;
            pointer-events: none;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .main {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            box-sizing: border-box;
        }

        .content-wrapper {
            position: relative;
            transform: translateY(-5%);
        }

        .avatar-img {
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.85);
            box-shadow:
                0 1px 2px rgba(30, 26, 22, 0.3),
                0 4px 8px rgba(30, 26, 22, 0.25),
                0 10px 20px rgba(30, 26, 22, 0.2),
                0 20px 40px rgba(30, 26, 22, 0.15),
                0 32px 64px rgba(30, 26, 22, 0.1),
                0 48px 80px rgba(30, 26, 22, 0.06),
                inset 0 6px 12px rgba(255, 255, 255, 0.6),
                inset 0 -6px 14px rgba(30, 26, 22, 0.35);
            outline: 2px solid rgba(40, 36, 32, 0.08);
            outline-offset: 6px;
            pointer-events: auto;
            transform: perspective(400px) translateZ(20px);
            transition: box-shadow 0.5s ease, transform 0.5s ease;
        }

        h1 {
            color: #3a3632;
            text-align: center;
            font-family: 'Raleway', 'Noto Sans SC', 'Helvetica Neue', sans-serif;
            font-weight: 200;
            font-size: 6em;
            animation: animate 4s ease-in-out infinite;
            margin: 0;
            margin-bottom: 10px;
            letter-spacing: 0.08em;
        }

        p {
            margin: 8px auto;
            padding: 0 10px;
            line-height: 1.8;
            width: 100%;
            text-align: center;
            font-weight: 300;
            font-size: 1.05em;
        }

        footer {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 10px;
        }

        footer a {
            pointer-events: auto;
            color: #6b6560;
        }

        footer span {
            font-size: 12px;
        }

        @keyframes animate {
            0%,
            100% {
                text-shadow: -1px -1px 0 rgba(143, 170, 140, 0.4), 1px 1px 0 rgba(176, 143, 158, 0.4);
            }

            25% {
                text-shadow: 1px 1px 0 rgba(143, 170, 140, 0.4), -1px -1px 0 rgba(176, 143, 158, 0.4);
            }

            50% {
                text-shadow: 1px -1px 0 rgba(143, 170, 140, 0.4), 1px -1px 0 rgba(176, 143, 158, 0.4);
            }

            75% {
                text-shadow: -1px 1px 0 rgba(143, 170, 140, 0.4), -1px 1px 0 rgba(176, 143, 158, 0.4);
            }
        }

        @media screen and (min-width: 1200px) {
            h1 {
                font-size: 7em;
            }

            .avatar-img {
                height: 180px;
            }

            p {
                font-size: 1.1em;
                width: 100%;
            }
        }

        @media screen and (min-width: 1600px) {
            .main {
                max-width: 1200px;
            }

            p {
                font-size: 1.2em;
            }
        }

        @media screen and (max-width: 1199px) and (min-width: 768px) {
            h1 {
                font-size: 6em;
            }

            .avatar-img {
                height: 160px;
            }
        }

        @media screen and (max-width: 767px) {
            h1 {
                font-size: 3.5rem;
            }

            .avatar-img {
                height: 150px;
            }

            .content-wrapper {
                transform: translateY(-2%);
            }

            .main {
                max-width: 100%;
            }
        }

        @media screen and (orientation: landscape) and (max-height: 600px) {
            h1 {
                font-size: 3rem;
                margin-bottom: 5px;
            }

            .avatar-img {
                height: 120px;
            }

            p {
                margin: 5px 0;
                font-size: 0.9em;
            }

            .links {
                margin-top: 10px;
            }

            .content-wrapper {
                transform: none;
            }
        }

        a {
            color: #7a6e66;
            text-decoration: none;
            border-bottom: 1px solid rgba(122, 110, 102, 0.3);
            pointer-events: auto;
            transition: color 0.3s, border-color 0.3s;
        }

        a:hover {
            color: #3a3632;
            border-bottom-color: #3a3632;
        }

        a:visited {
            color: #8a7e76;
        }

        footer a {
            color: #8a7e76;
            text-decoration: none;
            border-bottom: 1px solid rgba(138, 126, 118, 0.3);
        }

        footer a:hover {
            color: #3a3632;
            border-bottom-color: #3a3632;
        }

        .links {
            margin-top: 15px;
            font-size: 1.1em;
            letter-spacing: 0.05em;
        }

        .links a {
            padding: 2px 6px;
            border-radius: 3px;
            border-bottom: none;
            transition: background-color 0.3s, color 0.3s;
        }

        .links a:hover {
            background-color: rgba(58, 54, 50, 0.08);
            border-bottom: none;
        }
    </style>

    <script>
        window.ga = function () {};
    </script>
</head>

<body>
    <canvas></canvas>
    <div class="paper-overlay">
        <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
            <filter id="paper-fine">
                <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="5" stitchTiles="stitch"/>
            </filter>
            <filter id="paper-coarse">
                <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="5" stitchTiles="stitch"/>
            </filter>
            <rect width="100%" height="100%" filter="url(#paper-fine)" opacity="0.32"/>
            <rect width="100%" height="100%" filter="url(#paper-coarse)" opacity="0.1"/>
        </svg>
    </div>
    <div class="wrap">
        <div class="main">
            <div class="content-wrapper">
                <img src="./static/img/avatar_2_small.jpg" class="avatar-img" height="160" alt="avatar image">
                <h1>Hi there!</h1>
                <p>This man (a.k.a. 小熊猫) appreciates math, gorgeous algorithms, indie, and love. Well, not quite in that order.</p>
                <p>During the day, he works for Microsoft <a href="https://www.microsoft.com/en-us/research/people/jinyzho/"><sup>1</sup></a>, and at night, he works for himself <a href="https://bento.me/xxm"><sup>2</sup></a>.</p>
                <div class="links">
                    <a href="https://blog.xxm.plus">Blog</a> |
                    <a href="https://x.com/xxm459259">X(Twitter)</a> |
                    <a href="https://bento.me/xxm">Other Links</a>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/script.js"></script>
    <script>
    (function () {
        var avatar = document.querySelector('.avatar-img');
        var isHovering = false;

        avatar.addEventListener('mouseenter', function () {
            isHovering = true;
            avatar.style.transition = 'transform 0.12s ease, box-shadow 0.12s ease';
        });

        avatar.addEventListener('mousemove', function (e) {
            if (!isHovering) return;
            var rect = avatar.getBoundingClientRect();
            var cx = (e.clientX - rect.left) / rect.width - 0.5;
            var cy = (e.clientY - rect.top) / rect.height - 0.5;

            var rotY = cx * 30;
            var rotX = -cy * 30;

            var sx = -cx * 18;
            var sy = -cy * 18;
            var hx = cx * 14;
            var hy = cy * 14;

            avatar.style.transform =
                'perspective(350px) rotateX(' + rotX + 'deg) rotateY(' + rotY + 'deg) translateZ(24px) scale(1.06)';

            avatar.style.boxShadow =
                sx * 0.5 + 'px ' + sy * 0.5 + 'px 3px rgba(30,26,22,0.35), ' +
                sx + 'px ' + sy + 'px 10px rgba(30,26,22,0.28), ' +
                (sx * 1.8) + 'px ' + (sy * 1.8) + 'px 24px rgba(30,26,22,0.22), ' +
                (sx * 2.8) + 'px ' + (sy * 2.8) + 'px 44px rgba(30,26,22,0.16), ' +
                (sx * 4) + 'px ' + (sy * 4) + 'px 72px rgba(30,26,22,0.1), ' +
                (sx * 5) + 'px ' + (sy * 5) + 'px 96px rgba(30,26,22,0.05), ' +
                'inset ' + hx + 'px ' + hy + 'px 16px rgba(255,255,255,0.6), ' +
                'inset ' + (-hx) + 'px ' + (-hy) + 'px 16px rgba(30,26,22,0.4)';
        });

        avatar.addEventListener('mouseleave', function () {
            isHovering = false;
            avatar.style.transition = 'transform 0.5s ease, box-shadow 0.5s ease';
            avatar.style.transform = '';
            avatar.style.boxShadow = '';
        });
    })();
    </script>
</body>

</html>
